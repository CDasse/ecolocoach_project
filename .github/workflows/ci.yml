name: Build & Package

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    # ==========================================
    # JOB 1 : TESTS UNITAIRES (PHPUNIT)
    # ==========================================
    test:
        name: Run Unit Tests
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl
                    coverage: none

            -   name: Create .env for testing
                run: |
                    echo "APP_ENV=test" > .env
                    echo "APP_SECRET=test-placeholder-secret-32chars!!" >> .env
                    echo "DEFAULT_URI=http://127.0.0.1:8000" >> .env
                    echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db" >> .env
                    echo "MESSENGER_TRANSPORT_DSN=in-memory://" >> .env

            -   name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: vendor
                    key: composer-test-${{ hashFiles('composer.lock') }}
                    restore-keys: composer-test-

            -   name: Install dependencies (with dev tools)
                run: composer install --no-interaction --prefer-dist --no-scripts

            -   name: Execute PHPUnit tests
                run: vendor/bin/phpunit

    # ==========================================
    # JOB 2 : TESTS E2E (PLAYWRIGHT + BDD)
    # ==========================================
    test-e2e:
        name: Run Playwright E2E Tests
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '20'
                    cache: 'npm'

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl, pdo_sqlite

            -   name: Create .env for testing
                run: |
                    echo "APP_ENV=test" > .env
                    echo "APP_SECRET=test-secret" >> .env
                    echo "DEFAULT_URI=http://127.0.0.1:8000" >> .env
                    echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db" >> .env
                    echo "MESSENGER_TRANSPORT_DSN=in-memory://" >> .env

            -   name: Install PHP dependencies
                run: composer install --prefer-dist --no-scripts --no-progress

            -   name: Setup Database and Fixtures
                run: |
                    mkdir -p var
                    touch var/data.db
                    php bin/console doctrine:schema:create --env=test
                    php bin/console doctrine:fixtures:load -n --env=test

            -   name: Compile assets for E2E
                run: |
                    php bin/console importmap:install
                    php bin/console asset-map:compile

            -   name: Install NPM dependencies
                run: npm install

            -   name: Install Playwright Browsers
                run: npx playwright install --with-deps

            -   name: Run Playwright tests
                run: |
                    php -S 127.0.0.1:8000 -t public &
                    sleep 3
                    npx playwright test

    # ==========================================
    # JOB 3 : SONARCLOUD
    # ==========================================
    sonarcloud:
        name: SonarCloud Scan
        runs-on: ubuntu-latest
        needs: [ test, test-e2e ]

        steps:
            -   name: Checkout code
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                with:
                    fetch-depth: 0

            -   name: SonarCloud Scan
                uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # ==========================================
    # JOB 4 : BUILD (PREPARATION PRODUCTION)
    # ==========================================
    build:
        name: Build artifact
        needs: [ test, test-e2e, sonarcloud ]
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl
                    coverage: none

            -   name: Create .env for build
                run: |
                    echo "APP_ENV=prod" > .env
                    echo "APP_SECRET=${{ secrets.APP_SECRET || 'build-placeholder-secret-32chars!!' }}" >> .env

            -   name: Cache Composer dependencies
                uses: actions/cache@v4
                with:
                    path: vendor
                    key: composer-${{ hashFiles('composer.lock') }}
                    restore-keys: composer-

            -   name: Install dependencies (production)
                run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

            -   name: Install importmap assets
                run: php bin/console importmap:install
                env:
                    APP_ENV: prod

            -   name: Compile assets
                run: php bin/console asset-map:compile
                env:
                    APP_ENV: prod

            -   name: Package artifact
                run: |
                    tar \
                      --exclude='.git' \
                      --exclude='tests' \
                      --exclude='var/cache/dev' \
                      --exclude='var/cache/test' \
                      --exclude='var/log' \
                      --exclude='.env.local' \
                      --exclude='.env.local.php' \
                      -czf /tmp/ecolocoach-${{ github.sha }}.tar.gz .

            -   name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                    name: ecolocoach-${{ github.sha }}
                    path: /tmp/ecolocoach-${{ github.sha }}.tar.gz
                    retention-days: 7
                    if-no-files-found: error

    # ==========================================
    # JOB 5 : GREEN-IT ANALYSIS
    # ==========================================
    greenit:
        name: GreenIT Analysis
        runs-on: ubuntu-latest
        needs: build

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'

            -   name: Install dependencies
                run: composer install --prefer-dist --no-progress

            -   name: Start Symfony server & wait
                run: |
                    php -S 127.0.0.1:8000 -t public &
                    npx wait-on http://127.0.0.1:8000

            -   name: GreenIT Analysis
                uses: ythirion/greenit-analysis-action@0.1.0
                with:
                    url-file: 'greenit-urls.yaml'
                    min-ecoindex: '90'
