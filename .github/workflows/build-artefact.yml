name: Build & Package

on:
    workflow_run:
        workflows: [ "SonarCloud Scan" ]
        types:
            - completed
    workflow_dispatch:

jobs:
    build:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl
                    coverage: none

            -   name: Create .env for build
                run: |
                    echo "APP_ENV=prod" > .env
                    echo "APP_SECRET=${{ secrets.APP_SECRET || 'build-placeholder-secret-32chars!!' }}" >> .env

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: vendor
                    key: composer-${{ hashFiles('composer.lock') }}
                    restore-keys: composer-

            -   name: Install dependencies (production)
                run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

            -   name: Install importmap assets
                run: php bin/console importmap:install
                env:
                    APP_ENV: prod

            -   name: Compile assets
                run: php bin/console asset-map:compile
                env:
                    APP_ENV: prod

            -   name: Package artifact
                run: |
                    tar \
                      --exclude='.git' \
                      --exclude='tests' \
                      --exclude='var/cache/dev' \
                      --exclude='var/cache/test' \
                      --exclude='var/log' \
                      --exclude='.env.local' \
                      --exclude='.env.local.php' \
                      -czf /tmp/ecolocoach-${{ github.sha }}.tar.gz .

            -   name: Upload artifact
                uses: actions/upload-artifact@v7
                with:
                    name: ecolocoach-${{ github.sha }}
                    path: /tmp/ecolocoach-${{ github.sha }}.tar.gz
                    retention-days: 7
                    if-no-files-found: error
