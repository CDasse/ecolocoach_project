name: Tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    # ==========================================
    # JOB 1 : TESTS UNITAIRES (PHPUNIT)
    # ==========================================
    test:
        name: Run Unit Tests
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl
                    coverage: none

            -   name: Create .env for testing
                run: |
                    echo "APP_ENV=test" > .env
                    echo "APP_SECRET=test-placeholder-secret-32chars!!" >> .env
                    echo "DEFAULT_URI=http://127.0.0.1:8000" >> .env
                    echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db" >> .env
                    echo "MESSENGER_TRANSPORT_DSN=in-memory://" >> .env

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: vendor
                    key: composer-test-${{ hashFiles('composer.lock') }}
                    restore-keys: composer-test-

            -   name: Install dependencies (with dev tools)
                run: composer install --no-interaction --prefer-dist --no-scripts

            -   name: Execute PHPUnit tests
                run: vendor/bin/phpunit

    # ==========================================
    # JOB 2 : TESTS E2E (PLAYWRIGHT + BDD)
    # ==========================================
    test-e2e:
        name: Run Playwright E2E Tests
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Setup Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: '24'
                    cache: 'npm'

            -   name: Setup PHP
                uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, intl, pdo_sqlite

            -   name: Create .env for testing
                run: |
                    echo "APP_ENV=test" > .env
                    echo "APP_SECRET=test-secret" >> .env
                    echo "DEFAULT_URI=http://127.0.0.1:8000" >> .env
                    echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db" >> .env
                    echo "MESSENGER_TRANSPORT_DSN=in-memory://" >> .env

            -   name: Install PHP dependencies
                run: composer install --prefer-dist --no-scripts --no-progress

            -   name: Setup Database and Fixtures
                run: |
                    mkdir -p var
                    touch var/data.db
                    php bin/console doctrine:schema:create --env=test
                    php bin/console doctrine:fixtures:load -n --env=test

            -   name: Compile assets for E2E
                run: |
                    php bin/console importmap:install
                    php bin/console asset-map:compile

            -   name: Install NPM dependencies
                run: npm install

            -   name: Install Playwright Browsers
                run: npx playwright install --with-deps

            -   name: Run Playwright tests
                run: |
                    php -S 127.0.0.1:8000 -t public &
                    npx wait-on http://127.0.0.1:8000
                    npx playwright test

            -   name: Upload Playwright report
                uses: actions/upload-artifact@v7
                if: always()
                with:
                    name: playwright-report
                    path: playwright-report/
                    retention-days: 7
